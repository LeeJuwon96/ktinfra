apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bluegreen
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/LeeJuwon96/ktinfra.git
    targetRevision: master
    path: ./

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    {}
